<!DOCTYPE HTML>
<html>
<head>
<title>GOUGE EM VALOR</title>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>
</head>
<body>
<canvas id="c"></canvas>
<div id="a">
  <audio id="s" preload="auto" autobuffer>
    <source src="gougeemvalor.mp3" type="audio/mp3"/>
  </audio>
  <audio id="s2" preload="auto" autobuffer>
    <source src="gougeemvalor2.mp3" type="audio/mp3"/>
  </audio>
</div>
</body>
<script>
var i = 0;
var context = document.getElementById("c").getContext("2d");
var d = function() {
  context.canvas.width = window.innerWidth;
  context.canvas.height = window.innerHeight;

  var bg = new Image();
	bg.onload = function(){
		context.drawImage(bg, 0, 0, context.canvas.width, context.canvas.height);
	};
	bg.src = "gougeemvalorb.jpg";
};
window.resize = d;
window.onload = function() {
  d();
  document.addEventListener("click", function(e)
  {
    var x = e.clientX;
    var y = e.clientY;
    var im = new Image();
    im.onload = function() {
      context.drawImage(im, x - 210, y - 210);
    };
    if (Math.floor((Math.random() * 15)) < 14){
     im.src = "gougeemvalor.jpg";
     $("#s").clone().attr("id","a_"+i).appendTo("#a");
    } else {
     im.src = "gougeemvalor.png";
     $("#s2").clone().attr("id","a_"+i).appendTo("#a");
    }
    var elem = document.getElementById('a_'+i);
    setTimeout("$('#a_"+i+"').remove();", 4200);
    i++;
    if (elem) {
      elem.play();
      $("#p").text("GOUGE EM VALOR");
    }
  });
};
</script>
</html>
