var data;
$.ajax({
  url: "log.json",
  dataType: "json",
  xhr: function() {
    var xhr = new window.XMLHttpRequest();
    xhr.addEventListener("progress", function(e){
      if (e.lengthComputable) {
        var p = e.loaded / e.total * 100;
        $("#loading").val(p);
        console.log(p);
      }
    }, false);
    return xhr;
  },
  success: function(response) {
    data = response;
    $("#loading").fadeTo(1000,0);
    $("#block").fadeTo(1000,0);
    $("#chart").fadeTo(1000,1);
    $("#block").remove();
  }
});
