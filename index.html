<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="//ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js"></script>
<script src="//code.highcharts.com/highcharts.js"></script>
<script src="//code.highcharts.com/modules/drilldown.js"></script>
<style>
html, body, #wrap, #block {
  height: 98%;
  overflow: hidden;
}
#chart {
  width: 100%;
  height: 90%;
}
#chart, #credits {
  opacity: 0;
  position: relative;
}
#block, #loading {
  margin: auto;
  position: absolute;
  top: 0;
  bottom: 0;
  left: 0;
  right: 0;
}
#wrap_options {
  text-align: center;
}
#options {
  opacity: 0;
  display: inline-block;
}
</style>
</head>

<body>
<div id="wrap">
<div id="chart"></div>
<div id="block"></div>
<progress id="loading" max="100" value="0"></progress>
<div id="wrap_options"><div id="options">showing total messages sent by <select id="user"></select></div></div>
<div id="credits">buttlyzer 0.0.2 on <a href="http://www.highcharts.com/">highcharts</a></div>
</div>

<script type="text/javascript">
var data = null;
var user_num = {};
var user_list = [];
var orig_options = {};

// store indices of user_num_array, other_msg, graphed_users
// increment indices when drilling down
// decrement indices when drilling up
// add to lists if the end of the list is hit
var user_num_array = [];
var user_num_array_list = [];
var user_num_array_ind = 0;
var other_msg = 0;
var other_msg_list = [];
var other_msg_ind = 0;
var graphed_users = {};
var graphed_users_list = [];
var graphed_users_ind = 0;

// aggregate <2% users, based on threshold, into a single "Other" group
// (re)populates user_num_array, graphed_users, and other_msg
var generate_other = function(threshold) {
  if (user_num_array_list.length === user_num_array_ind) {
    // generate new values and add to lists
    other_msg = 0;
    user_num_array = [];
    for (var user in user_num) {
      if (user_num.hasOwnProperty(user) && !graphed_users.hasOwnProperty(user)) {
        if (user_num[user] / threshold > 0.02) {
          user_num_array.push({name: user, y: user_num[user], drilldown: true});
          graphed_users[user] = user_num[user];
        }
        else {
          other_msg += user_num[user];
        }
      }
    }

    // sort by decreasing number of messages and add "Other" at the end
    user_num_array.sort(function(a, b) {
      if (a.y > b.y) {
        return -1;
      }
      if (a.y < b.y) {
        return 1;
      }
      return 0;
    });
    if (other_msg > 0) {
      user_num_array.push({name: "Other", y: other_msg, drilldown: true});
    }

    user_num_array_list.push(user_num_array);
    other_msg_list.push(other_msg);
    graphed_users_list.push(graphed_users);
  }
  else {
    // retrieve existing values
    user_num_array = user_num_array_list[user_num_array_ind];
    other_msg = other_msg_list[other_msg_ind];
    graphed_users = graphed_users_list[graphed_users_ind];
  }
  user_num_array_ind++;
  other_msg_ind++;
  graphed_users_ind++;
};

// returns data for column graph
// parameter u: string denoting user name
var user_column_data = function(u) {
  var d = [];
  var g = 60*60*24;
  var tz = 60*60*8;
  var dv = -1;
  var t = 0;
  // group data by intervals of g
  for (var i = 0; i < data.length; i++) {
    if (data[i].from !== u) {
      continue;
    }
    var cv = data[i].time;
    if (dv === -1) {
      t++;
      dv = cv;
    }
    else if (Math.floor((cv+tz)/g) === Math.floor((dv+tz)/g)) {
      t++;
    }
    else {
      d.push([(Math.floor(dv/g)*g+tz)*1000,t]);
      t = 0;
      dv = cv;
    }
  }
  if (t > 0) {
    d.push([(Math.floor(dv/g)*g+tz)*1000,t]);
  }
  return d;
};

Highcharts.setOptions({
  global: {
    timezoneOffset: 8*60 // PST
  },
  lang: {
    drillUpText: "◁ Back"
  }
});

var pie_options = {
  chart: {
    renderTo: "chart",
    events: {
      drilldown: function(e) {
        var name = e.point.name;
        if (name === "Other") {
          generate_other(other_msg);
          this.addSeriesAsDrilldown(e.point, {type: "pie", name: "Messages", data: user_num_array, showInLegend: false});
        }
        else {
          var d = user_column_data(name);
          hchart.destroy();
          hchart = new Highcharts.Chart(column_options);
          $("#chart").highcharts().addSeries({type: "column", name: "Messages", data: d, showInLegend: false});
          $("#user").val(name);
        }
      },
      drillup: function(e) {
        if (e.seriesOptions.type == "pie") {
          // revert to previously generated values
          user_num_array_ind--;
          other_msg_ind--;
          graphed_users_ind--;
          user_num_array = user_num_array_list[user_num_array_ind];
          other_msg = other_msg_list[other_msg_ind];
          graphed_users = graphed_users_list[graphed_users_ind];
        }
      }
    }
  },
  credits: {
    enabled: false
  },
  title: {
    text: ""
  },
  tooltip: {
    formatter: function() {
      var p = this.y*100/data.length;
      return this.point.name+"<br>"+this.series.name+": <b>"+this.y+"</b> ("+p.toFixed(2)+"%)";
    }
  },
  plotOptions: {
    series: {
      cursor: "pointer",
      dataLabels: {
        enabled: true,
        format: "<b>{point.name}</b>: {point.y}",
      },
      data: [],
      size: "90%"
    }
  },
  drilldown: {
    activeDataLabelStyle: {
      textDecoration: "none",
      fontWeight: "normal",
    },
    series: []
  }
};

var column_options = {
  chart: {
    renderTo: "chart",
    plotBackgroundColor: null,
    plotBorderWidth: null,
    plotShadow: false
  },
  credits: {
    enabled: false
  },
  title: {
    text: ""
  },
  tooltip: {
    pointFormat: "{series.name}: <b>{point.y}</b>"
  },
  xAxis: {
    type: "datetime",
    dateTimeLabelFormats: {
      day: "%b. %e",
      week: "%b. %e"
    },
    min: Date.UTC(2014,9,22),
    max: Date.UTC(2014,11,20)
  },
  yAxis: {
    title: {
      text: "Messages"
    },
    min: 0
  }
};

// create pie chart
var hchart = new Highcharts.Chart(pie_options);

// load json log
$.ajax({
  url: "/log.json",
  dataType: "json",
  xhrFields: {
    onprogress: function(e) {
      // log file size is hardcoded here
      $("#loading").val(e.loaded / 14946758 * 100);
    }
  },
  success: function(response) {
    data = response;
    for (var i = 0; i < data.length; i++) {
      if (user_num.hasOwnProperty(data[i].from)) {
        user_num[data[i].from]++;
      }
      else {
        user_list.push(data[i].from);
        user_num[data[i].from] = 1;
      }
    }
    user_list.sort(function(a, b) {
      return a.localeCompare(b);
    });
    $("#user").append(new Option("all users", "all users"));
    for (var i = 0; i < user_list.length; i++) {
      $("#user").append(new Option(user_list[i], user_list[i]));
    }

    generate_other(data.length);

    // populate original options
    orig_options.type = "pie";
    orig_options.name = "Messages";
    orig_options.data = user_num_array;
    $("#chart").highcharts().addSeries(orig_options);

    // fade in/out
    $("#loading").fadeTo(1000,0);
    $("#block").fadeTo(1000,0);
    $("#chart").fadeTo(1000,1);
    $("#credits").fadeTo(1000,1);
    $("#options").fadeTo(1000,1);
    $("#block").remove();
  }
});

// show line chart of messages by day (or the original pie chart)
$("#user").change(function() {
  var us = $("#user").val();
  hchart.destroy();
  if (us === "all users") {
    hchart = new Highcharts.Chart(pie_options);
    $("#chart").highcharts().addSeries(orig_options);
    user_num_array_ind = 1;
    other_msg_ind = 1;
    graphed_users_ind = 1;
  }
  else {
    var d = user_column_data(us);
    hchart = new Highcharts.Chart(column_options);
    $("#chart").highcharts().addSeries({type: "column", name: "Messages", data: d, showInLegend: false});
  }
});
</script>
</body>
</html>
