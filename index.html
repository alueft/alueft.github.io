<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="//ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js"></script>
<script src="//code.highcharts.com/highcharts.js"></script>
<style>
html, body, #wrap, #block {
  height: 98%;
  overflow: hidden;
}
#chart {
  width: 100%;
  height: 90%;
}
#chart, #credits {
  opacity: 0;
  position: relative;
}
#block, #loading {
  margin: auto;
  position: absolute;
  top: 0;
  bottom: 0;
  left: 0;
  right: 0;
}
#wrap_options {
  text-align: center;
}
#options {
  opacity: 0;
  display: inline-block;
}
</style>
</head>

<body>
<div id="wrap">
<div id="chart"></div>
<div id="block"></div>
<progress id="loading" max="100" value="0"></progress>
<div id="wrap_options"><div id="options">showing total messages sent by <select id="user"></select></div></div>
<div id="credits">buttlyzer 0.0.1 on <a href="http://www.highcharts.com/">highcharts</a></div>
</div>

<script type="text/javascript">
Highcharts.setOptions({
  global: {
    timezoneOffset: 8*60
  }
});

var pie_options = {
  chart: {
    renderTo: "chart",
    plotBackgroundColor: null,
    plotBorderWidth: null,
    plotShadow: false
  },
  credits: {
    enabled: false
  },
  title: {
    text: ""
  },
  tooltip: {
    pointFormat: "{series.name}: <b>{point.y} ({point.percentage:.2f}%)</b>"
  },
  plotOptions: {
    pie: {
      cursor: "pointer",
      dataLabels: {
        enabled: true,
        format: "<b>{point.name}</b>: {point.y}",
      },
      size: "90%"
    }
  }
};

var column_options = {
  chart: {
    renderTo: "chart",
    plotBackgroundColor: null,
    plotBorderWidth: null,
    plotShadow: false
  },
  credits: {
    enabled: false
  },
  title: {
    text: ""
  },
  tooltip: {
    headerFormat: "{point.x:%a %b. %e}<br>",
    pointFormat: "{series.name}: <b>{point.y}</b>"
  },
  xAxis: {
    type: "datetime",
    dateTimeLabelFormats: {
      day: "%b. %e",
      week: "%b. %e"
    },
    min: Date.UTC(2014,9,22),
    max: Date.UTC(2014,11,20)
  },
  yAxis: {
    title: {
      text: "Messages"
    },
    min: 0
  }
};

// create chart
var hchart = new Highcharts.Chart(pie_options);

var data = null;
var user_num = {};
var user_num_array = [];
var user_list = [];
var orig_options = {};

// load json log
$.ajax({
  url: "/log.json",
  dataType: "json",
  xhrFields: {
    onprogress: function(e) {
      // log file size is hardcoded here
      $("#loading").val(e.loaded / 14946758 * 100);
    }
  },
  success: function(response) {
    data = response;
    for (var i = 0; i < data.length; i++) {
      if (user_num.hasOwnProperty(data[i].from)) {
        user_num[data[i].from]++;
      }
      else {
        user_list.push(data[i].from);
        user_num[data[i].from] = 1;
      }
    }
    user_list.sort(function(a, b) {
      return a.localeCompare(b);
    });
    $("#user").append(new Option("all users", "all users"));
    for (var i = 0; i < user_list.length; i++) {
      $("#user").append(new Option(user_list[i], user_list[i]));
    }

    // aggregate <1% users into a single "Other" group
    var other = 0;
    for (var prop in user_num) {
      if (user_num.hasOwnProperty(prop)) {
        if (user_num[prop] / data.length > 0.01) {
          user_num_array.push([prop, user_num[prop]]);
        }
        else {
          other += user_num[prop];
        }
      }
    }
    user_num_array.sort(function(a, b) {
      if (a[1] > b[1]) {
        return -1;
      }
      if (a[1] < b[1]) {
        return 1;
      }
      return 0;
    });
    user_num_array.push(["Other", other]);

    var chart = $("#chart").highcharts();

    // populate original options
    orig_options.type = "pie";
    orig_options.name = "Messages";
    orig_options.data = user_num_array;
    chart.addSeries(orig_options);

    // fade in/out
    $("#loading").fadeTo(1000,0);
    $("#block").fadeTo(1000,0);
    $("#chart").fadeTo(1000,1);
    $("#credits").fadeTo(1000,1);
    $("#options").fadeTo(1000,1);
    $("#block").remove();
  }
});

// show line graph of messages by day
$("#user").change(function() {
  var point = null;
  var us = $("#user").val();
  hchart.destroy();
  if (us === "all users") {
    hchart = new Highcharts.Chart(pie_options);
    $("#chart").highcharts().addSeries(orig_options);
  }
  else {
    var d = [];
    var g = 60*60*24;
    var dv = -1;
    var t = 0;
    // group data by intervals of g
    for (var i = 0; i < data.length; i++) {
      if (data[i].from !== us) {
        continue;
      }
      var cv = data[i].time-60*60*8; // convert to PST
      if (dv === -1) {
        t++;
        dv = cv;
      }
      else if (Math.floor(cv/g) === Math.floor(dv/g)) {
        t++;
      }
      else {
        d.push([dv*1000,t]);
        t = 0;
        dv = cv;
      }
    }
    if (t > 0) {
      d.push([dv*1000,t]);
    }
    hchart = new Highcharts.Chart(column_options);
    $("#chart").highcharts().addSeries({type: "column", name: "Messages", data: d, showInLegend: false});
  }
});
</script>
</body>
</html>
